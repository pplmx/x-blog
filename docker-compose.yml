services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./x-blog.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
    volumes:
      - ./data:/app/data
    restart: unless-stopped